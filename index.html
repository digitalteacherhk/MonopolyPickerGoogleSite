<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>大富翁抽籤系統byDigitalTeacherHK</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --board-bg: #cde6d0;
            --center-bg: #fbf8ef;
            --border-color: #111;
            --monopoly-red: #e63946;
            --monopoly-blue: #0072bb;
            --monopoly-green: #1fb25a;
            --monopoly-purple: #8b5cf6;
            --monopoly-yellow: #ffb703;
            --font-zh: 'GenWanMin', 'Microsoft JhengHei', system-ui, sans-serif;
            --font-en: 'Montserrat', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        body {
            /* 使用 bg.png 作為整頁背景圖片 */
            background-image: url('./bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: var(--board-bg); /* 圖片載入前的底色 */
            color: #000;
            font-family: var(--font-zh);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* 遊戲主體 */
        #board-container {
            position: relative;
            width: 95vw;
            height: 53.4vw;
            max-width: 1200px;
            max-height: 675px;
            display: grid;
            gap: 2px;
            background: var(--border-color);
            border: 4px solid var(--border-color);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        .cell {
            background: #fff;
            position: relative;
            display: flex;
            flex-direction: column;
            text-align: center;
            font-weight: bold;
            transition: all 0.1s;
            overflow: hidden;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            z-index: 5;
        }

        .house-container {
            position: absolute;
            bottom: 2px;
            left: 2px;
            right: 2px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 2px;
            pointer-events: none;
        }

        .house-icon {
            display: inline-block;
        }

        .house-img {
            height: clamp(14px, 3vmin, 28px);
            width: auto;
            display: block;
        }

        .cell-text {
            padding: 0px;
            font-size: clamp(5px, 3vmin, 40px);
            color: #111;
            word-break: break-word;
            line-height: 1.2;
            font-weight: bold;
        }

        .cell.chance { background: #ffebcc; }
        .cell.chance .cell-text { color: #d97706; }

        .cell.fate { background: #ffe6e6; }
        .cell.fate .cell-text { color: #dc2626; }

        .cell.active {
            border: 4px solid var(--monopoly-red);
            box-shadow: inset 0 0 12px var(--monopoly-red);
            transform: scale(1.08);
            z-index: 15 !important;
            background: #fff0f0 !important;
        }

        /* 中央控制區 */
        #center-area {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--center-bg);
            border: 2px solid var(--border-color);
            margin: 5px;
            padding: 10px 20px;
            position: relative;
            text-align: center;
            z-index: 1;
        }

        /* ======== 右上角控制區（音量＋歷史＋設定） ======== */
        .top-right-controls {
            position: absolute;
            top: 10px;
            right: 15px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
            z-index: 20;
        }
        .top-right-row,
        .bottom-right-row {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* ======== 左上角工具區（大風吹＋順序重設） ======== */
        .top-left-tools {
            position: absolute;
            top: 10px;
            left: 15px;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 20;
        }

        /* 音訊控制按鈕本身 */
        .audio-controls {
            display: flex;
            gap: 8px;
        }
        .audio-btn {
            background: #fff;
            border: 2px solid #000;
            border-radius: 8px;
            cursor: pointer;
            padding: 5px 8px;
            font-size: 18px;
            box-shadow: 2px 2px 0px #000;
            transition: 0.1s;
        }
        .audio-btn:active {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0px #000;
        }
        .audio-btn.on {
            background: var(--monopoly-green);
            color: #fff;
        }
        .audio-btn.off {
            background: #4b5563;
            color: #e5e7eb;
            opacity: 0.9;
        }

        .logo-text {
            background: var(--monopoly-red);
            color: #fff;
            padding: 8px 20px;
            font-size: clamp(18px, 4vmin, 40px);
            transform: rotate(-3deg);
            border: 3px solid #000;
            box-shadow: 5px 5px 0px #000;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .logo-image {
            width: min(90%, 500px);
            height: auto;
            display: block;
            margin-bottom: 15px;
        }

        #status-text {
            font-size: clamp(14px, 2.5vmin, 24px);
            margin-bottom: 6px;
            font-weight: bold;
            color: #333;
            min-height: 3vmin;
        }

        /* 狀態顏色分類 */
        #status-text.status-normal { color: #374151; }
        #status-text.status-success { color: #15803d; }
        #status-text.status-info { color: #2563eb; }
        #status-text.status-warning { color: #b45309; }
        #status-text.status-danger { color: #b91c1c; }

        /* 目前玩家與提示文字 */
        #current-player {
            font-size: clamp(14px, 2.2vmin, 22px);
            margin-bottom: 4px;
            font-weight: bold;
            color: #111;
            min-height: 2.5vmin;
        }
        #hint-text {
            font-size: clamp(10px, 1.5vmin, 14px);
            color: #6b7280;
            margin-bottom: 10px;
        }

        #dice-container { display: flex; gap: 15px; margin-bottom: 15px; }
        .dice {
            width: clamp(40px, 6vmin, 60px);
            height: clamp(40px, 6vmin, 60px);
            background: white; color: var(--monopoly-red);
            font-size: clamp(20px, 4vmin, 35px); border-radius: 10px;
            display: flex; justify-content: center; align-items: center;
            border: 3px solid #000; box-shadow: 3px 3px 0px #000;
            font-weight: bold;
        }

        /* 主要操作按鈕區（擲骰子／快速抽籤） */
        .btn-main-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            z-index: 10;
            width: 100%;
            margin-bottom: 8px;
        }

        /* 放大的擲骰子按鈕（置中顯眼） */
        #btn-roll {
            min-width: 210px;
            padding: 8px 8px;
            font-size: clamp(18px, 4vmin, 40px);
        }

        /* 縮小版快速抽籤，排在擲骰子下方 */
        #btn-marquee {
            min-width: 100px;
            padding: 5px 5px;
            font-size: clamp(10px, 2vmin, 16px);
        }

        /* 次要工具列（大風吹／重設／歷史／設定） */
        .btn-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            z-index: 10;
            width: 100%;
        }

        button {
            cursor: pointer;
            padding: 10px 18px;
            font-size: clamp(12px, 1.8vmin, 18px);
            font-weight: bold; border: 2px solid #000; box-shadow: 3px 3px 0px #000;
            transition: 0.2s;
            border-radius: 6px;
        }
        button:hover { transform: translate(-2px, -2px); box-shadow: 5px 5px 0px #000; }
        button:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0px #000; }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            box-shadow: 0 0 0 #000;
            transform: none !important;
        }

        .btn-settings { background: var(--monopoly-blue); color: white; }
        .btn-roll { background: var(--monopoly-red); color: white; }
        .btn-marquee { background: #ffebcc; }
        .btn-shuffle { background: #eee; }
        .btn-reset { background: var(--monopoly-purple); color: white; }
        .btn-history { background: var(--monopoly-yellow); color: #000; }

        /* 小圖示按鈕（工具列用） */
        .icon-btn {
            width: 38px;
            height: 38px;
            padding: 0;
            border-radius: 50%;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 設定介面 Modal & 歷史紀錄 Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: #fff;
            width: 85%; max-width: 700px; padding: 25px; border-radius: 12px;
            max-height: 85vh; overflow-y: auto; border: 4px solid #000;
        }

        .cloud-section {
            background: #f0f7ff;
            padding: 15px; border: 2px dashed var(--monopoly-blue);
            margin-bottom: 20px; border-radius: 8px; text-align: left;
        }
        .code-display {
            font-size: 22px;
            color: var(--monopoly-red); letter-spacing: 2px;
            background: #fff; padding: 5px 15px; border: 2px solid #000; font-family: monospace;
        }

        textarea { width: 100%; height: 80px; margin: 8px 0 15px 0; border: 2px solid #000; padding: 10px; font-size: 14px; box-sizing: border-box; }
        select { font-size: 16px; padding: 5px; margin-bottom: 15px; border: 2px solid #000; font-weight: bold; }
        .modal-footer { text-align: right; margin-top: 10px; border-top: 2px solid #eee; padding-top: 15px; }

        /* 歷史紀錄清單 */
        #history-list {
            list-style: none;
            padding: 0; margin: 0; text-align: left;
            max-height: 50vh; overflow-y: auto;
        }
        #history-list li {
            padding: 10px;
            border-bottom: 1px dashed #ccc; font-size: 16px; font-weight: bold;
        }
        #history-list li.history-item {
            padding-left: 14px;
            border-left: 4px solid transparent;
        }
        #history-list li.history-winner { border-left-color: var(--monopoly-blue); }
        #history-list li.history-chance { border-left-color: #d97706; }
        #history-list li.history-fate { border-left-color: #dc2626; }
        #history-list li.history-house { border-left-color: var(--monopoly-green); }

        .history-header {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 5px;
        }
        .btn-clear-history {
            position: absolute;
            right: 0;
            background: #f97373;
            color: #fff;
            padding: 4px 10px;
            font-size: 12px;
            border-radius: 999px;
            border: 2px solid #000;
            cursor: pointer;
            box-shadow: 2px 2px 0px #000;
        }
        #history-list li span.time { color: #666; font-size: 12px; margin-right: 10px; font-weight: normal;}

        /* ======== 抽籤結果彈出視窗 ======== */
        #result-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75); display: none; justify-content: center; align-items: center; z-index: 2000;
        }
        .result-content {
            background: #fff;
            width: 80%; max-width: 500px; padding: 40px; border-radius: 20px;
            text-align: center; border: 6px solid #000; box-shadow: 10px 10px 0px #000;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .result-title { font-size: clamp(24px, 3.5vmin, 40px); font-weight: bold; margin-bottom: 20px; color: #333; }
        .result-name { font-size: clamp(36px, 7vmin, 80px); font-weight: bold; color: var(--monopoly-blue); margin: 30px 0; word-break: break-word;}
        .result-text { font-size: clamp(20px, 4vmin, 40px); font-weight: bold; margin: 30px 0; }
        .btn-close-result {
            background: var(--monopoly-red);
            color: white; padding: 12px 30px; font-size: clamp(16px, 2.5vmin, 24px);
            margin-top: 20px; border: 3px solid #000; box-shadow: 4px 4px 0px #000;
            cursor: pointer; font-weight: bold;
        }
        .btn-close-result:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0px #000; }
        .btn-close-result:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #000; }

        .result-house-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .btn-house {
            background: var(--monopoly-green);
            color: #fff;
            padding: 8px 14px;
            font-size: clamp(12px, 2vmin, 18px);
            font-weight: bold;
            border: 2px solid #000;
            border-radius: 6px;
            box-shadow: 3px 3px 0px #000;
            cursor: pointer;
        }

        .btn-house-wrong {
            background: #ccc;
            color: #000;
        }

        /* ======== 響應式設計 (RWD) ======== */
        @media (max-width: 768px), (max-aspect-ratio: 1/1) {
            #board-container {
                width: 98vw;
                height: 90vw;
                max-height: 800px;
            }
            #center-area { padding: 8px; }
            /* 手機上維持縱向排列，只微調內距 */
            .btn-main-group button { width: auto; }
            .btn-toolbar {
                overflow-x: auto;
                justify-content: flex-start;
            }
            .modal-content { width: 95%; padding: 15px; }
            .modal-footer { display: flex; flex-direction: column; gap: 10px; }
            .modal-footer button { width: 100%; }
        }
    </style>
</head>
<body>

<div id="settings-modal" class="modal-overlay">
    <div class="modal-content">
        <h2 data-i18n="modalTitle">🛠️ 系統設定</h2>

        <div class="cloud-section">
            <label data-i18n="cloudTitle"><b>☁️ 雲端同步與匯入 (Google Sheets)</b></label><br>
            <div style="margin: 10px 0;">
                <input type="text" id="input-cloud-code" data-i18n-placeholder="cloudPlaceholder" placeholder="輸入5位代碼" style="width: 120px; padding: 8px; border: 2px solid #000;">
                <button onclick="loadFromCloud()" class="btn-settings" style="padding: 7px 15px; box-shadow: 2px 2px 0 #000;" data-i18n="btnLoad">讀取存檔</button>
            </div>
            <div id="display-new-code" style="margin-top: 10px; display:none; background: #fff; padding: 10px; border: 1px solid #ccc;">
                <span data-i18n="yourCode">您的存取代碼：</span><span class="code-display" id="new-code-text">-----</span>
                <p style="font-size: 12px; color: #666; margin-top:5px;" data-i18n="codeHint">* 請記下代碼，以便日後讀取資料。</p>
            </div>
        </div>

        <label data-i18n="langLabel"><b>🌐 介面語言 / Language</b></label><br>
        <select id="lang-select" onchange="changeLanguage(this.value)">
            <option value="zh">繁體中文</option>
            <option value="en">English</option>
        </select><br>

        <label data-i18n="labelStudents"><b>1. 匯入名單</b> (格式：學號,姓名。也可直接貼上名字)</label>
        <textarea id="input-students"></textarea>

        <label data-i18n="labelChance"><b>2. 自訂【機會】內容</b> (每行一項)</label>
        <textarea id="input-chance"></textarea>

        <label data-i18n="labelFate"><b>3. 自訂【命運】內容</b> (每行一項)</label>
        <textarea id="input-fate"></textarea>

        <div class="modal-footer">
            <button onclick="toggleModal(false)" style="background: #ccc; box-shadow:none;" data-i18n="btnCancel">取消返回</button>
            <button onclick="saveAndApplyLocal()" style="background: var(--monopoly-blue); color: #fff;" data-i18n="btnApply">直接套用 (不備份)</button>
            <button onclick="saveToCloud()" style="background: var(--monopoly-green); color: #fff;" data-i18n="btnSave">儲存並備份至雲端</button>
        </div>
    </div>
</div>

<div id="history-modal" class="modal-overlay">
    <div class="modal-content" style="max-width: 500px; text-align: center;">
        <div class="history-header">
            <h2 data-i18n="historyTitle">📜 抽籤歷史紀錄</h2>
            <button class="btn-clear-history" onclick="clearHistory()" title="清空歷史">🗑️</button>
        </div>
        <ul id="history-list">
            <li style="text-align: center; color: #666;" data-i18n="historyEmpty">目前尚無紀錄</li>
        </ul>
        <div class="modal-footer" style="justify-content: center; display: flex;">
            <button class="btn-close-result" onclick="toggleHistory(false)" data-i18n="btnConfirm">確認</button>
        </div>
    </div>
</div>

<div id="result-modal">
    <div class="result-content" id="result-box">
        <div class="result-title" id="result-title"></div>
        <div id="result-display"></div>
        <button class="btn-close-result" onclick="closeResult()" data-i18n="btnConfirm">確認</button>
    </div>
</div>

        <div id="board-container">
    <div id="center-area">
        <div class="top-right-controls">
            <div class="top-right-row">
                <div class="audio-controls">
                    <button class="audio-btn" id="btn-bgm" onclick="toggleBGM()" title="切換背景音樂">🎵</button>
                    <button class="audio-btn" id="btn-sfx" onclick="toggleSFX()" title="切換音效">🔊</button>
                </div>
            </div>
            <div class="bottom-right-row">
                <button id="btn-history" class="icon-btn btn-history" onclick="toggleHistory(true)" title="📜 歷史紀錄">📜</button>
                <button id="btn-settings" class="icon-btn btn-settings" onclick="toggleModal(true)" title="⚙️ 系統設定">⚙️</button>
            </div>
        </div>

        <div class="top-left-tools">
            <button id="btn-shuffle" class="icon-btn btn-shuffle" onclick="shuffleBoard()" title="🔄 大風吹">🔄</button>
            <button id="btn-reset" class="icon-btn btn-reset" onclick="resetBoard()" title="↩️ 順序重設">↩️</button>
        </div>

        <img src="./logo.png" class="logo-image" alt="Monopoly Picker Logo">
        <div id="status-text" data-i18n="ready" class="status-normal">準備好了嗎？</div>
        <div id="hint-text"></div>

        <div id="dice-container">
            <div class="dice" id="dice1">?</div>
            <div class="dice" id="dice2">?</div>
        </div>

        <!-- 主要操作按鈕 -->
        <div class="btn-main-group">
            <button id="btn-roll" class="btn-roll" onclick="rollDice()" data-i18n="btnRoll">🎲 擲骰子</button>
            <button id="btn-marquee" class="btn-marquee" onclick="startMarquee()" data-i18n="btnQuick">⚡ 快速抽籤</button>
        </div>

    </div>
</div>

<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxklt9GvSHTJzJBIL-MlwUfHLJtlWDMeaaquDb96A-yPjaH9hUi4yCCVClQ3iH8Yy-K/exec';

    const i18n = {
        zh: {
            modalTitle: "🛠️ 系統設定", cloudTitle: "<b>☁️ 雲端同步與匯入 (Google Sheets)</b>", btnLoad: "讀取存檔",
            yourCode: "您的存取代碼：", codeHint: "* 請記下代碼，以便日後讀取資料。", cloudPlaceholder: "輸入5位代碼",
            langLabel: "<b>🌐 介面語言 / Language</b>", labelStudents: "<b>1. 匯入名單</b> (格式：學號,姓名。也可直接貼上名字)",
            labelChance: "<b>2. 自訂【機會】內容</b> (每行一項)", labelFate: "<b>3. 自訂【命運】內容</b> (每行一項)",
            btnCancel: "取消返回", btnApply: "直接套用 (不備份)", btnSave: "儲存並備份至雲端",
            logo: "大富翁抽籤", ready: "準備好了嗎？", btnRoll: "🎲 擲骰子", btnQuick: "⚡ 快速抽籤",
            btnShuffle: "🔄 大風吹", btnReset: "↩️ 順序重設", btnSettings: "⚙️ 系統設定", btnHistory: "📜 歷史紀錄",
            historyTitle: "📜 抽籤歷史紀錄", historyEmpty: "目前尚無紀錄", alertCount: "人數必須介於 8 到 40 人之間！",
            statusSaved: "✅ 設定已更新！", statusWinner: "📍 抽中幸運兒", statusChance: "🎁 機會時刻",
            statusFate: "⚡ 命運降臨", statusShuffle: "🔄 大風吹，吹亂所有位置！", mapChance: "❓<br>機會", mapFate: "❗<br>命運",
            statusBuild: "🏠 建造房屋完成！",

        rawStudents.forEach(line => {
            let tLine = line.trim();
            if(tLine === '') return;
            if(tLine.includes(',')) {
                let parts = tLine.split(',');
                parsed.push({ id: parts[0].trim(), name: parts[1].trim() || parts[0].trim() });
            } else {
                parsed.push({ id: tLine, name: tLine });
            }
        });

        if(parsed.length < 8 || parsed.length > 40) {
            alert(i18n[currentLang].alertCount);
            return false;
        }

        originalStudents = JSON.parse(JSON.stringify(parsed));
        students = JSON.parse(JSON.stringify(originalStudents));
        studentHouses = {};
        chanceList = document.getElementById('input-chance').value.trim().split('\n').filter(l => l);
        fateList = document.getElementById('input-fate').value.trim().split('\n').filter(l => l);

        currentIndex = 0;
        historyData = [];
        generateMap();
        renderBoard();
        return true;
    }

    async function saveToCloud() {
        if (!saveSettings()) return;
        const statusText = document.getElementById('status-text');
        statusText.innerText = i18n[currentLang].msgSaveWait;

        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 12000);

        try {
            const response = await fetch(GAS_URL, {
                method: 'POST',
                redirect: 'follow',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({
                    students: originalStudents,
                    chance: chanceList,
                    fate: fateList
                }),
                signal: controller.signal
            });

            const result = await response.json();
            clearTimeout(timeoutId);

            if (result.result === 'success') {
                document.getElementById('display-new-code').style.display = 'block';
                document.getElementById('new-code-text').innerText = result.code;
                statusText.innerText = i18n[currentLang].msgSaveSuccess + result.code;
                alert(i18n[currentLang].msgSaveSuccess + result.code);
                toggleModal(false);
            } else {
                throw new Error("Result is not success");
            }
        } catch (e) {
            clearTimeout(timeoutId);
            console.error(e);
            if (e.name === 'AbortError') {
                alert(i18n[currentLang].msgSaveTimeout);
                statusText.innerText = i18n[currentLang].msgSaveTimeout;
            } else {
                alert(i18n[currentLang].msgSaveFail);
                statusText.innerText = i18n[currentLang].msgSaveFail;
            }
            toggleModal(false);
        }

    function generateMap() {
        let N = students.length;
        let specialCount = 4;
        let totalCells = N + specialCount;
        if (totalCells % 2 !== 0) { specialCount++; totalCells++; }

        let targetSum = (totalCells + 4) / 2;
        boardW = Math.round(targetSum * 16 / 25);
        boardH = targetSum - boardW;
        if (boardH < 3) { boardH = 3; boardW = targetSum - 3; }

        mapData = [];
        let sIdx = 0;
        let specialIndices = [0, boardW - 1, boardW + boardH - 2, 2 * boardW + boardH - 3];
        const colors = ['#fdf6e3', '#e0f7fa', '#fce4ec', '#fff3e0', '#e8f5e9', '#fff9c4'];

        for (let i = 0; i < totalCells; i++) {
            if (specialIndices.includes(i)) {
                let isChance = i === specialIndices[0] || i === specialIndices[2];
                mapData.push({
                    type: isChance ? 'chance' : 'fate',
                    text: isChance ? i18n[currentLang].mapChance : i18n[currentLang].mapFate
                });
            } else {
                if(students[sIdx]) {
                    let colorIdx = sIdx % colors.length;
                    const stu = students[sIdx];
                    if (!studentHouses[stu.id]) {
                        studentHouses[stu.id] = { small: 0, middle: 0, large: 0 };
                    }
                    mapData.push({
                        type: 'student',
                        name: stu.name,
                        id: stu.id,
                        color: colors[colorIdx],
                        houses: studentHouses[stu.id]
                    });
                    sIdx++;
                } else {
                    mapData.push({ type: 'fate', text: i18n[currentLang].mapFate });
                }
            }
        }
    }

    function getGridPos(i, W, H) {
        if (i < W) return { col: i + 1, row: 1 };
        if (i < W + H - 2) return { col: W, row: i - W + 2 };
        if (i < 2 * W + H - 2) return { col: W - (i - (W + H - 2)), row: H };
        return { col: 1, row: H - 1 - (i - (2 * W + H - 2)) };
    }

    function getHouseIconsHTML(houses) {
        if (!houses) return '';
        const parts = [];
        for (let i = 0; i < (houses.small || 0); i++) {
            parts.push('<span class="house-icon"><img class="house-img" src="./smallhouse.png" alt="small house"></span>');
        }
        for (let i = 0; i < (houses.middle || 0); i++) {
            parts.push('<span class="house-icon"><img class="house-img" src="./middlehouse.png" alt="middle house"></span>');
        }
        for (let i = 0; i < (houses.large || 0); i++) {
            parts.push('<span class="house-icon"><img class="house-img" src="./largehouse.png" alt="large house"></span>');
        }
        if (!parts.length) return '';
        return `<div class="house-container">${parts.join('')}</div>`;
    }

    function updateStudentHouses(studentId, delta) {
        const idKey = studentId;
        if (!studentHouses[idKey]) {
            studentHouses[idKey] = { small: 0, middle: 0, large: 0 };
        }
        const info = studentHouses[idKey];

        if (delta > 0) {
            for (let k = 0; k < delta; k++) {
                info.small = (info.small || 0) + 1;
                while (info.small >= 3) {
                    info.small -= 3;
                    info.middle = (info.middle || 0) + 1;
                }
                while (info.middle >= 3) {
                    info.middle -= 3;
                    info.large = (info.large || 0) + 1;
                }
            }
        } else if (delta < 0) {
            for (let k = 0; k < Math.abs(delta); k++) {
                if (info.small > 0) {
                    info.small -= 1;
                } else if (info.middle > 0) {
                    // 1 middle 拆成 3 small，再減 1 small，最後變 2 small
                    info.middle -= 1;
                    info.small += 2;
                } else if (info.large > 0) {
                    // 1 large 拆成 3 middle，再減 1 middle，最後變 2 middle
                    info.large -= 1;
                    info.middle += 2;
                }
            }
        }

        studentHouses[idKey] = info;
        return info;
    }

        }
        historyData.unshift({ time: timeStr, text: historyText, type: 'house' });

        closeResult();
    }

        const display = document.getElementById('result-display');

        modal.style.display = 'flex';
        title.innerText = currentLang === 'en' ? '🏠 Edit Houses' : '🏠 調整房屋';
        title.style.color = '#333';

        display.innerHTML = `
            <div class="result-name">${stu.name}</div>
            <div class="result-house-buttons">
                <button id="btn-house-plus" class="btn-house">+ 房屋</button>
                <button id="btn-house-minus" class="btn-house btn-house-wrong">- 房屋</button>
            </div>
        `;
        box.style.borderColor = 'var(--monopoly-blue)';

        const btnPlus = document.getElementById('btn-house-plus');
        const btnMinus = document.getElementById('btn-house-minus');

        if (btnPlus) {
            btnPlus.onclick = () => {
                updateStudentHouses(studentId, 1);
                generateMap();
                renderBoard();
            };
        }
        if (btnMinus) {
            btnMinus.onclick = () => {
                updateStudentHouses(studentId, -1);
                generateMap();
                renderBoard();
            };
        }
    }

    function shuffleBoard() {
        if (isAnimating) return;
        playSfx('blow'); // 更新：改為播放大風吹專屬音效
        closeResult();
        students.sort(() => Math.random() - 0.5);
        generateMap();
        renderBoard();
        setStatus('info', i18n[currentLang].statusShuffle);
    }

    function resetBoard() {
        if (isAnimating) return;
        playSfx('click'); // 點擊音效
        closeResult();
        students = JSON.parse(JSON.stringify(originalStudents));
        currentIndex = 0;
        generateMap();
        renderBoard();
        setStatus('normal', i18n[currentLang].ready);
        const currentPlayerEl = document.getElementById('current-player');
        if (currentPlayerEl) currentPlayerEl.innerText = '';
    }

    // 更新工具列按鈕的提示文字（依語系切換）
    function updateToolbarTitles() {
        const langData = i18n[currentLang];
        const btnShuffle = document.getElementById('btn-shuffle');
        const btnReset = document.getElementById('btn-reset');
        const btnHistory = document.getElementById('btn-history');
        const btnSettings = document.getElementById('btn-settings');

        if (btnShuffle && langData.btnShuffle) btnShuffle.title = langData.btnShuffle;
        if (btnReset && langData.btnReset) btnReset.title = langData.btnReset;
        if (btnHistory && langData.btnHistory) btnHistory.title = langData.btnHistory;
        if (btnSettings && langData.btnSettings) btnSettings.title = langData.btnSettings;
    }

    function setStatus(type, text) {
        const el = document.getElementById('status-text');
        if (!el) return;
        el.innerText = text;
        el.classList.remove('status-normal', 'status-success', 'status-info', 'status-warning', 'status-danger');
        el.classList.add(`status-${type || 'normal'}`);
    }

    // 更新工具列按鈕的提示文字（依語系切換）
    function updateToolbarTitles() {
        const langData = i18n[currentLang];
        const btnShuffle = document.getElementById('btn-shuffle');
        const btnReset = document.getElementById('btn-reset');
        const btnHistory = document.getElementById('btn-history');
        const btnSettings = document.getElementById('btn-settings');

        if (btnShuffle && langData.btnShuffle) btnShuffle.title = langData.btnShuffle;
        if (btnReset && langData.btnReset) btnReset.title = langData.btnReset;
        if (btnHistory && langData.btnHistory) btnHistory.title = langData.btnHistory;
        if (btnSettings && langData.btnSettings) btnSettings.title = langData.btnSettings;
    }

    // 啟用/停用主要操作與工具列按鈕
    function setControlsEnabled(enabled) {
        const ids = ['btn-roll', 'btn-marquee', 'btn-shuffle', 'btn-reset', 'btn-history', 'btn-settings'];
        ids.forEach(id => {
            const el = document.getElementById(id);
            if (!el) return;
            el.disabled = !enabled;
        });
    }

    function changeLanguage(lang) {
        currentLang = lang;
        document.body.style.fontFamily = (lang === 'en') ? 'var(--font-en)' : 'var(--font-zh)';
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (i18n[lang][key]) el.innerHTML = i18n[lang][key];
        });
        document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
            const key = el.getAttribute('data-i18n-placeholder');
            if (i18n[lang][key]) el.placeholder = i18n[lang][key];
        });
        updateToolbarTitles();
        setStatus('normal', i18n[lang].ready);
        generateMap();
        renderBoard();
    }

    // 初始化
    refreshAudioButtons();
    setControlsEnabled(true);
    changeLanguage('zh');
</script>
</body>
</html>
